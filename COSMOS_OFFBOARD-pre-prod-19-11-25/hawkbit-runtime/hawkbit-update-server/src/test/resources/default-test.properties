#Properties file for testing purpose.

# Sandbox, small files only
spring.servlet.multipart.max-file-size=100000000
spring.servlet.multipart.max-request-size=100000000
hawkbit.server.security.dos.maxArtifactSize=100000000
hawkbit.server.security.dos.maxArtifactStorage=100000000000
spring.servlet.multipart.enabled=true
hawkbit.artifact.validate-file-size=false

# User Security
spring.security.user.name=admin
spring.security.user.password={noop}admin
spring.main.allow-bean-definition-overriding=true

