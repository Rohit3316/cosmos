# Download URL generation configuration
hawkbit.artifact.url.protocols.download-http.rel=download-http
hawkbit.artifact.url.protocols.download-http.hostname=localhost
hawkbit.artifact.url.protocols.download-http.ip=127.0.0.1
hawkbit.artifact.url.protocols.download-http.protocol=http
hawkbit.artifact.url.protocols.download-http.port=8080
hawkbit.artifact.url.protocols.download-http.https.protocol=https
hawkbit.artifact.url.protocols.download-http.https.port=443
hawkbit.artifact.url.protocols.download-http.http.port=80
hawkbit.artifact.url.protocols.download-http.supports=DDI
hawkbit.artifact.url.protocols.download-http.ref={protocol}://{hostnameRequest}:{portRequest}/device/v1/controllers/{controllerId}/softwaremodules/{softwareModuleId}/artifacts/{artifactFileName}
hawkbit.artifact.url.protocols.download-cdn-http.rel=download
hawkbit.artifact.url.protocols.download-cdn-http.hostname=localhost
hawkbit.artifact.url.protocols.download-cdn-http.ip=127.0.0.1
hawkbit.artifact.url.protocols.download-cdn-http.protocol=http
hawkbit.artifact.url.protocols.download-cdn-http.port=8080
hawkbit.artifact.url.protocols.download-cdn-http.supports=DDI
hawkbit.artifact.url.protocols.download-cdn-http.ref={hawkbit.artifact.url.cdn.host}{hawkbit.artifact.url.cdn.rootDirectory}{hawkbit.artifact.url.cdn.directory}{artifactFileName}
hawkbit.artifact.url.cdn.directory=/{tenant}/{type}/{SHA256}
hawkbit.artifact.url.custom.download=  http://testcdn.cosmos.stellantis.edgekey.net/tenant/{tenant}/hash/{SHA256}/artifacts/{artifactFileName}
hawkbit.artifact.url.s3.directory = {tenant}/{type}/{SHA256}/