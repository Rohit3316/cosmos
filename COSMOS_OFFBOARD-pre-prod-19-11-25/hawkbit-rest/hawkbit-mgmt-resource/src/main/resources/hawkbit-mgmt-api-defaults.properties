# Upload of large files
spring.servlet.multipart.max-file-size=16384MB
spring.servlet.multipart.max-request-size=-1
spring.servlet.multipart.file-size-threshold=1MB
rollout.valid.end.date.days=2
log.collectionRequired=false
log.maxSuccessVin=20
log.maxFailureVin=100
log.maxLogAllFileSize=1048576
log.maxLogEachFileSize=209715
log.maxNumberOfFiles=5

