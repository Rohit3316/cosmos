# Logging START - activate to see request/response details
#logging.level.org.eclipse.hawkbit.rest.util.MockMvcResultPrinter=DEBUG
# Logging END
management.endpoints.web.exposure.include=*
management.endpoint.refresh.enabled=true
log.collectionRequired=false
log.maxSuccessVin=20
log.maxFailureVin=100
log.maxLogAllFileSize=1048576
log.maxLogEachFileSize=209715
log.maxNumberOfFiles=5
#SNS Configuration
cosmos.server.sns.url-to-s3-transfer.arn=arn:aws:sns:us-east-1:800747857007:dummy-topic
cosmos.server.artifacts.s3.bucket.name=dummy-bucket
cosmos.server.s3.support-package.bucket.name="cosmos-us-east-1-dev-support-packages"
cosmos.server.sns.cdn-upload.arn=arn:aws:sns:us-east-1:800747857007:cdn-dummy-topic
cosmos.server.dd.ecu-certificates.bucket.name=dummy-bucket

# ARN for the SNS topic used for S3 file deletion
cosmos.server.sns.s3-delete.arn=arn:aws:sns:us-east-1:800747857657:cosmos-dev-storage-delete-sns

cosmos.server.sns.cdn-delete.arn=arn:aws:sns:us-east-1:800747857657:cosmos-dummy-sns-topic
junit.jupiter.execution.parallel.enabled = true
junit.jupiter.execution.parallel.mode.default = concurrent
logging.level.root=INFO
logging.level.org.eclipse.hawkbit.mgmt.rest.resource.MgmtRolloutResourceTest=DEBUG
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.use_sql_comments=true
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql=TRACE
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

initConfig.softwareModuleFormat=QNX,Android,Linux,Vera,Machina
hawkbit.server.tenant.configuration.rollout-mandatory-support-package-rsp.defaultValue=
hawkbit.server.tenant.configuration.rollout-mandatory-support-package-esp.defaultValue=
hawkbit.artifact.validate-file-size=false
hawkbit.artifact.url.cdn.host=http://localhost:8080
hawkbit.artifact.url.cdn.rootDirectory=/dir
hawkbit.artifact.url.protocols.download-cdn-http.ref={hawkbit.artifact.url.cdn.host}{hawkbit.artifact.url.cdn.rootDirectory}{hawkbit.artifact.url.cdn.directory}{artifactFileName}

cosmos.server.s3.deployment.log.bucket.name=test-deployment-logs-bucket

cosmos.server.kafka.retryMaxAttempt=3
cosmos.server.kafka.retryDelay=2000
cosmos.server.kafka.retryMultiplier=2